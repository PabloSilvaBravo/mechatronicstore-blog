name: Blog Ingest (RSS + filters)

# Ingest diario de 10 sources del blog. Sin LLM.
# Después dumpea data/blog-rank-input.json para que CCR ranking lo lea.

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Run ingest
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          # Pablo 21-may-2026: heros se rehostean a R2 (mechanoticias-images
          # bucket compartido) durante el ingest. Inmuniza contra hotlink/WAF.
          CLOUDFLARE_API_TOKEN_R2: ${{ secrets.CLOUDFLARE_API_TOKEN_R2 }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_REHOST_ENABLED: ${{ secrets.R2_REHOST_ENABLED }}
        run: python3 scripts/ingest_blog.py

      - name: Dump ranking input
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: python3 scripts/dump_blog_rank_input.py --limit 30

      - name: Dump translate input (post-ranking)
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: python3 scripts/dump_blog_translate_input.py --limit 10

      - name: Commit + push rank+translate inputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          changes=0
          for f in data/blog-rank-input.json data/blog-translate-input.json; do
            if [ -f "$f" ] && ! git diff --quiet "$f"; then
              git add "$f"
              changes=1
            fi
          done
          if [ "$changes" -eq 0 ]; then
            echo "::notice::No changes — skip commit"
            exit 0
          fi
          ts=$(date -u +%Y-%m-%dT%H:%MZ)
          git commit -m "chore(blog-ingest): refresh rank+translate inputs ${ts}"
          git push origin HEAD:main
