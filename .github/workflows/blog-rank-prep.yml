name: Blog Rank Prep (refresh input)

# Pablo 19-may-2026: con Routine B corriendo 3×/día (04:30, 12:30, 20:30 UTC),
# el rank-input solo se generaba después del ingest (04:00 UTC). La 2da y 3ra
# corrida diaria de Routine B leían input stale de hasta 16h.
#
# Pablo 22-may-2026: bajamos cadencia 3/día → 2/día con cap duplicado.
# Backlog real 0, ratio rank→publish ~9% justifica menos corridas. Ranking
# slots nuevos 06:30 + 18:30 UTC. Refresh corre 5 min antes (06:25 + 18:25).
#
# 2026-05-27: cadencia-check +5d detectó CRITICAL (0 publishes 96h+, 0 translate
# 72h+, published_7d cayendo de 36→13). Cron revertido a 3/día (slots originales
# 04:30/12:30/20:30 UTC, prep 5 min antes). CCR triggers requieren revert
# manual via RemoteTrigger (no expuesto en cloud routine). Ver
# data/cadencia-check-5d-20260527T120740Z.md y data/cadencia-revert-log.md.
#
# Este workflow corre 5 min antes de cada Routine B y refresca el dump con
# los drafts más recientes (incluye refetch promotes + cambios manuales).
#
# Si no hay drafts pendientes (n_candidates=0), commitea igual el archivo
# actualizado para que Routine B vea timestamp fresco y aborte sin trabajar.

on:
  schedule:
    # 25 min después de la hora pero antes de cada rank (que es :30)
    - cron: "25 4,12,20 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  prep:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install deps
        run: pip install -r scripts/requirements.txt

      - name: Dump fresh rank input
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: python3 scripts/dump_blog_rank_input.py --limit 60

      - name: Dump fresh translate input (paralelo)
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: python3 scripts/dump_blog_translate_input.py --limit 15

      - name: Commit + push si cambió
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          changes=0
          for f in data/blog-rank-input.json data/blog-translate-input.json; do
            if [ -f "$f" ] && ! git diff --quiet "$f"; then
              git add "$f"
              changes=1
            fi
          done
          if [ "$changes" = "1" ]; then
            git commit -m "chore(rank-prep): refresh inputs $(date -u +%Y-%m-%dT%H:%MZ)"
            git push origin HEAD:main
          else
            echo "Sin cambios, no commit"
          fi
