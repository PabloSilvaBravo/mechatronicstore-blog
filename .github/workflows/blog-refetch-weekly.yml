name: Blog Refetch Weekly (rescate rejected)

# Pablo 19-may-2026: rescate automático de tutoriales rejected cuyo
# body_en quedó truncado durante el ingest inicial. El script
# re-fetchea full HTML del source_url y promueve a 'draft' si pasan
# hard_filters.
#
# Cron: domingo 05:00 UTC = sábado 01:00 CL — bajo tráfico, antes del
# ciclo nuevo de la semana.

on:
  schedule:
    - cron: "0 5 * * 0"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  refetch:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install deps
        run: pip install -r scripts/requirements.txt

      - name: Refetch rejected with full HTML
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: python3 scripts/refetch_rejected.py --limit 50 --sleep 1.5
