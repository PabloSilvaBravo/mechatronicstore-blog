name: Blog Pipeline Monitor

# Pablo 20-may-2026: health-check cada 2h del pipeline blog (42 sources,
# routines CCR, scoring, editorial overhaul). Si algo cae en silencio,
# GH Actions manda email-on-failure automáticamente.
#
# Métricas chequeadas:
# - Drafts pendientes (cola creciendo = Routine B mal)
# - Published last 24h (0 = pipeline congelado)
# - Ranked stuck (>10 = Routine C lenta)
# - Rejected ratio 48h (>95% = filtros mal)
# - Sources silenciosas (>30% = ingest roto)
# - Editorial rejected ratio (>60% = prompt muy estricto)

on:
  schedule:
    - cron: "0 */2 * * *"   # cada 2h
  workflow_dispatch: {}
  # También se dispara cuando los persists pushean (visibilidad reactiva)
  push:
    branches: [main]
    paths:
      - "data/blog-rank-output.json"
      - "data/blog-translate-output.json"

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install deps
        run: pip install -r scripts/requirements.txt

      - name: Run pipeline monitor
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: python3 scripts/monitor_pipeline.py

      - name: Commit health report (best-effort)
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -f data/pipeline-health.json ] && ! git diff --quiet data/pipeline-health.json; then
            git add data/pipeline-health.json
            git commit -m "chore(monitor): pipeline health $(date -u +%Y-%m-%dT%H:%MZ)"
            git push origin HEAD:main || echo "Push failed (concurrent commit?) — siguiente corrida lo intenta de nuevo"
          fi
