name: Blog Translate Persist

# Dispara cuando data/blog-translate-output.json cambia (CCR routine pushea).
# Persiste las traducciones a DB con status='published'.

on:
  push:
    branches: [main]
    paths: ["data/blog-translate-output.json"]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  persist:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install deps
        run: pip install -r scripts/requirements.txt

      - name: Persist translations
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: python3 scripts/persist_blog_translation.py
