name: Pipeline Healthcheck

# Watchdog del blog pipeline. Cada 6h consulta Turso y, si detecta
# silent failures (no publish >7d, no ingest >48h, etc.), manda email
# CRIT a Pablo vía Resend.
#
# Razón: sin este watchdog, si Routine A/B/C se rompe, no hay señal
# hasta que Pablo nota que pasaron semanas sin nuevos tutoriales.

on:
  schedule:
    # Cada 6 horas: 00:00, 06:00, 12:00, 18:00 UTC
    - cron: "0 */6 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  healthcheck:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Run pipeline healthcheck
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          DIGEST_TO_EMAIL: ${{ secrets.DIGEST_TO_EMAIL }}
          DIGEST_FROM_EMAIL: ${{ secrets.DIGEST_FROM_EMAIL }}
        run: python3 scripts/pipeline_healthcheck.py
